name: Secret Scan

on:
  pull_request:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  secret-scan-pr:
    if: github.event_name == 'pull_request'
    uses: lanlada/.github/.github/workflows/reusable-secret-scan.yml@main
    with:
      mode: pr

  secret-scan-full:
    if: github.event_name != 'pull_request'
    uses: lanlada/.github/.github/workflows/reusable-secret-scan.yml@main
    with:
      mode: full

name: Reusable Secret Scan

on:
  workflow_call:
    inputs:
      mode:
        description: Scan mode, pr or full
        required: true
        type: string

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

jobs:
  scan:
    name: gitleaks (${{ inputs.mode }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          asset="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${asset}"
          curl -fsSL -o "$asset" "$url"
          echo "${GITLEAKS_SHA256}  ${asset}" | sha256sum -c -
          tar -xzf "$asset" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan
        id: scan
        env:
          MODE: ${{ inputs.mode }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -uo pipefail
          if [ "$MODE" = "pr" ]; then
            gitleaks git --no-banner --redact \
              --report-format json --report-path gitleaks-report.json \
              --log-opts="${BASE_SHA}..${HEAD_SHA}" .
          else
            gitleaks git --no-banner --redact \
              --report-format json --report-path gitleaks-report.json .
          fi
          code=$?
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Summary
        if: always()
        run: |
          set -euo pipefail
          count=0
          if [ -f gitleaks-report.json ]; then
            count="$(jq 'length' gitleaks-report.json)"
          fi
          {
            echo "## gitleaks (${{ inputs.mode }})"
            echo ""
            echo "Findings: ${count}"
            if [ "${count}" -gt 0 ]; then
              echo ""
              echo "| Rule | File | Commit |"
              echo "| ---- | ---- | ------ |"
              jq -r '.[] | "| \(.RuleID) | \(.File) | \(.Commit // "-") |"' gitleaks-report.json
              echo ""
              echo "Full redacted report: artifact gitleaks-report-${{ inputs.mode }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gitleaks-report-${{ inputs.mode }}
          path: gitleaks-report.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Fail on findings
        if: steps.scan.outputs.exit_code != '0'
        run: |
          echo "::error::gitleaks found potential secrets. See the job summary and the redacted report artifact."
          exit 1

labels:
  - name: "type:feat"
    color: "1d76db"
    description: "New feature"
  - name: "type:fix"
    color: "1d76db"
    description: "Bug fix"
  - name: "type:refactor"
    color: "1d76db"
    description: "Code change that neither fixes a bug nor adds a feature"
  - name: "type:chore"
    color: "1d76db"
    description: "Tooling, dependencies, or configuration"
  - name: "type:docs"
    color: "1d76db"
    description: "Documentation only"
  - name: "type:ci"
    color: "1d76db"
    description: "CI or CD workflow change"
  - name: "type:perf"
    color: "1d76db"
    description: "Performance improvement"
  - name: "type:setup"
    color: "1d76db"
    description: "Scaffolding or infrastructure wiring"
  - name: "type:build"
    color: "1d76db"
    description: "Build system or external dependencies"
  - name: "type:revert"
    color: "1d76db"
    description: "Reverts a previous change"
  - name: "type:style"
    color: "1d76db"
    description: "Formatting only, no logic change"
  - name: "type:test"
    color: "1d76db"
    description: "Adding or correcting tests"
  - name: "type:incident"
    color: "1d76db"
    description: "Production incident"
  - name: "type:epic"
    color: "1d76db"
    description: "Large multi-issue initiative"
  - name: "priority:high"
    color: "b60205"
    description: "Address first"
  - name: "priority:medium"
    color: "fbca04"
    description: "Normal scheduling"
  - name: "priority:low"
    color: "0e8a16"
    description: "Address when convenient"
  - name: "status:blocked"
    color: "d93f0b"
    description: "Blocked by external or internal work"
  - name: "status:needs-triage"
    color: "fef2c0"
    description: "Awaiting triage"
  - name: "status:needs-info"
    color: "c5def5"
    description: "Awaiting more information"
  - name: "status:needs-issue-title-fix"
    color: "e99695"
    description: "Issue title fails the convention check"
  - name: "status:needs-pr-title-fix"
    color: "e99695"
    description: "Pull request title fails the convention check"
  - name: "status:stale"
    color: "ededed"
    description: "Inactive; subject to auto-close"
  - name: "area:deps"
    color: "bfdadc"
    description: "Dependencies"
  - name: "area:ci"
    color: "bfdadc"
    description: "CI or CD configuration"
  - name: "area:config"
    color: "bfdadc"
    description: "Project configuration"
  - name: "area:docs"
    color: "bfdadc"
    description: "Documentation"
